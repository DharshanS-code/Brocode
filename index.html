<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brocode | Secure Chat Encoder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#075E54">
</head>
<body>
    <header class="header">
        <div class="header-info">
            <h1 class="app-title">Brocode</h1>
            <span class="app-subtitle">Secure Chat Encoder</span>
        </div>
    </header>

    <main class="chat-area" id="chatArea">
        <div class="message msg-received helper-msg">
            <div class="msg-text">🔒 Welcome to Brocode. Paste a message, enter your secret key, and choose to Encrypt or Decrypt. Tap any message to copy it.</div>
            <div class="msg-time">Now</div>
        </div>
    </main>

    <div id="toast" class="toast hidden">Copied to clipboard!</div>

    <footer class="input-panel">
        <div class="helper-text">⚠️ Use the exact same key to decrypt.</div>
        
        <div class="controls-row">
            <input type="password" id="cryptoKey" placeholder="Secret Key" required>
            <select id="cryptoMode">
                <option value="encrypt">Encrypt</option>
                <option value="decrypt">Decrypt</option>
            </select>
        </div>

        <form id="chatForm" class="message-row">
            <textarea id="messageInput" placeholder="Type or paste message..." rows="1" required></textarea>
            <button type="submit" class="send-btn" aria-label="Send">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </form>
    </footer>

    <script src="app.js"></script>
</body>
</html>
